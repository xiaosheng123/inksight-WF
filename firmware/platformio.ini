[platformio]
default_envs = wft_4in2b

[common]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
board_build.filesystem = littlefs
board_build.extra_flags =
extra_scripts = post:merge_firmware.py
lib_deps =
    adafruit/Adafruit GFX Library@^1.11.0
    zinggjm/GxEPD2@^1.6.0
    olikraus/U8g2_for_Adafruit_GFX@^1.8.0
    bblanchon/ArduinoJson@^7.2.0
    tzapu/WiFiManager@^2.0.17
    mathertel/OneButton@^2.6.1
    git+https://github.com/JADE-Jerry/nongli.git
    git+https://github.com/tignioj/ArduinoUZlib

[env:epd_42_c3]
extends = common
board = esp32-c3-devkitm-1
build_flags =
    -DBOARD_PROFILE_ESP32_C3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DEPD_WIDTH=400
    -DEPD_HEIGHT=300
    -DEPD_PANEL_42
    -DWFT_4IN2B
    -DEPD_COLOR=3
    -DSPI_FREQUENCY=20000000
    -DSPI_MODE=SPI_MODE0
    -DALLOW_INSECURE_FALLBACK=0

[env:wft_4in2b]
extends = env:wft_4in2b_z15

[env:wft_4in2b_z15]
extends = env:epd_42_c3
build_flags =
 ${env:epd_42_c3.build_flags}
 -DWFT_4IN2B
 -DWFT_DRIVER_Z15
 -DEPD_COLOR=3
 -DSPI_FREQUENCY=20000000
 -DSPI_MODE=SPI_MODE0
 -DDEBUG_EPD=1
 -DUSE_WAVESHARE_4IN2

